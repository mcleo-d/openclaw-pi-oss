# SSH hardening drop-in — /etc/ssh/sshd_config.d/99-hardening.conf
# Tune numeric values to your requirements before deploying.
# See docs/03-security-hardening.md for rationale.

PermitRootLogin no
PasswordAuthentication no
PermitEmptyPasswords no
PubkeyAuthentication yes
X11Forwarding no
AllowAgentForwarding no
AllowTcpForwarding local
MaxAuthTries <your-value>
MaxSessions <your-value>
ClientAliveInterval <your-value>
ClientAliveCountMax <your-value>
LoginGraceTime <your-value>
